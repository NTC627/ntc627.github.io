---
layout: default
title: Categories
---
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories</title>
</head>
<body>
<div class="main-layout">
<aside class="sidebar">
    <div class="panel">
        <h3>Author</h3> 
        <img src="/assets/avatar.jpg" alt="avatar" class="avatar"> 
        <p style="text-align: center;">b14ckb0x</p>
    </div> 
    <div class="panel">
         <h3>Statistics</h3> <p>Posts: {{ site.posts.size }}</p> 
    </div> 
    <div class="panel"> <h3>Contact</h3>  <p><a href="https://space.bilibili.com/108097771?spm_id_from=333.1007.0.0">Visit my bilibili</a></p> <p><a href="https://github.com/NTC627">Visit my GitHub</a></p> 
    </div> 
</aside> 
    <main class="content category-index">
    <h1 style="text-align: center;">Categories</h1>
    <ul class="category-index-list">
        {% for category in site.categories %}
            <li class="category-index-item">
                <a href="{{ '/category/' | append: category[0] | append: '/' | relative_url }}"
                   class="category-index-link">
                    {{ category[0] }}
                </a>
                <span class="category-count">
                    ({{ category[1].size }})
                </span>
            </li>
        {% endfor %}
    </ul> 
    </main>
</div>
</body>
</html>

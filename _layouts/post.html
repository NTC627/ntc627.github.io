---
layout: default
---

<article class="post">

    <h1>{{ page.title }}</h1>
    {% assign chars = page.content | strip_html | size %}
    {% assign minutes = chars | divided_by: 200 | plus: 1 %}
    <div class="post-info">
        {{ page.date | date: "%Y-%m-%d" }}
        · {{ chars }} 字
        · {{ minutes }} 分钟
    </div>

    <div class="post-content">
        {{ content }}
    </div>

</article>

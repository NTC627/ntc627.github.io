---
layout: default
---

<article class="post">

    <h1>{{ page.title }}</h1>
    {% assign chars = page.content | strip_html | size %}
    <div class="post-info">
        {{ page.date | date: "%Y-%m-%d" }}
        · {{ chars }} 字
    </div>

    <div class="post-content">
        {{ content }}
    </div>

</article>

---
layout: default
---

<article class="post">

    <h1>{{ page.title }}</h1>

    <div class="post-info">
        {{ page.date | date: "%Y-%m-%d" }}
    </div>

    {% if page.excerpt %}
    <div class="post-summary">
        {{ page.excerpt }}
    </div>
    {% endif %}

    <div class="post-content">
        {{ content }}
    </div>

</article>

<!DOCTYPE html>

<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="google-site-verification=Z6RovIqZTBN_qjzIY7nw1z0pxNqSQj3D-9vXqCynCXs"/>

<title>
    {% if page.title %}
        {{ page.title }} | b14ckb0x's space
    {% else %}
        b14ckb0x's space
    {% endif %}
</title>

<link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
<script src="{{ '/assets/js/search.js' | relative_url }}"></script>

</head>

<body>

<div id="wrapper">
<script>
    SimpleJekyllSearch({
        searchInput: document.getElementById('search-input'),
        resultsContainer: document.getElementById('results-container'),
        json: '{{ "/search.json" | relative_url }}', 
        searchResultTemplate: '<li><a href="{url}"><strong>{title}</strong></a> <small>{date}</small></li>',
        noResultsText: 'No Results',
        limit: 10, 
        fuzzy: true
    })
</script>

<header class="navbar">
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/categories.html' | relative_url }}">Categories</a>
    <a href="{{ '/about.html' | relative_url }}">About</a>
    <a href="{{ '/links.html' | relative_url }}">Links</a>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Search">
        <ul id="results-container"></ul>
    </div>
</header>

<div class="container">
    {{ content }}
</div>

<footer class="footer">
    Hacked by b14ckb0x
</footer>


</div>

</body>
</html>

---
layout: default
---

<article class="post">

    <h1>{{ page.category }}</h1>

    <ul>
    {% assign posts = site.categories[page.category] %}
    {% for post in posts %}
        <li>
            <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
            <small>{{ post.date | date: "%Y-%m-%d" }}</small>
        </li>
    {% endfor %}
    </ul>

</article>
